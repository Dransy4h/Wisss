<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
      .clickable {
        cursor : pointer;
      }
      /* Styling tabel hasil pencarian agar rapi */
      #hasilPencarian table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background-color: var(--bs-body-bg);
        color: var(--bs-body-color);
      }
      #hasilPencarian th, #hasilPencarian td {
        border: 1px solid var(--bs-border-color);
        padding: 10px;
        text-align: left;
      }
      #hasilPencarian th {
        background-color: rgba(0, 0, 0, 0.1);
      }
    </style>
    <link rel="stylesheet" href="style.css" />

    <title>Cari Gangguan</title>
  </head>
  <body id="cariPage">
    
    <div class="card border-0">
      <div class="card-header fixed-top bg-dark-subtle">
        <div class="row align-items-center container-fluid">
          <div class="col-3">
            <a href="index.html" class="nav-link active">
              <img src="assets/img/imagees.png" class="clickable" alt="GIPAY" style="width: 32px; height: 32px; object-fit: contain;">
            </a>
          </div>
          <div class="col-9">
            <nav class="nav justify-content-end align-items-center">
              
              <a href="index.html" class="nav-link text-light me-3 small">Home</a>
              
              <div class="nav-item dropdown">
                <button class="btn nav-link dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                  <i class="bi bi-sun theme-icon-active" data-theme-icon-active="bi-sun"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="light">
                      <i class="bi bi-sun me-2 opacity-50" data-theme-icon="bi-sun"></i> Light
                    </button>
                  </li>
                  <li> 
                    <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="dark">
                      <i class="bi bi-moon-fill me-2 opacity-50" data-theme-icon="bi-moon-fill"></i> Dark
                    </button>
                  </li>
                  <li><hr class="dropdown-divider"></li>
                  <li>
                    <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="auto">
                      <i class="bi bi-circle-half me-2 opacity-50" data-theme-icon="bi-circle-half"></i> Auto
                    </button>
                  </li>
                </ul>
              </div>
            </nav>
          </div>
        </div>
      </div>
    </div> 
    <section class="container text-center" style="padding-top: 8rem; min-height: 80vh;">
      <h2 class="mb-4">Menu Pencarian Gangguan Inverter</h2>
      
      <div class="row justify-content-center mt-4">
        <div class="col-3" style="width: 16rem;">
          <div class="card border border-dark p-3 shadow">
            <form onsubmit="event.preventDefault(); cariGangguan();">
              <div class="mb-2 text-start">
                <label for="keyword" class="form-label small fw-bold">Cari Gangguan:</label>
                <input type="text" id="keyword" class="form-control form-control-sm" placeholder="Contoh: x007...">
              </div>
              <button type="submit" class="btn btn-primary btn-sm w-100">Cari</button>
              
              <a href="index.html" class="btn btn-outline-primary btn-sm w-100 mt-2">lihat detail</a>
            </form>
          </div>
        </div>
      </div>

      <div class="container mt-4">
        <div class="row justify-content-center">
          <div class="col-md-8 text-start" id="hasilPencarian"></div>
        </div>
      </div>
    </section>

    <footer class="text-center py-4 mt-5 border-top border-secondary-subtle">
      <p>Created with <i class="bi bi-heart-fill text-danger"></i> by Tim 5</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
    const sheetId = '1dcO7kOygkZDbYmc8Jx28UfTLFuIVgo4pXuSTAeYnzxI';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
    
    let dataGangguan = []; 

    // Fungsi pencegah XSS
    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
        );
    }

    function cariGangguan() {
        const keyword = document.getElementById('keyword').value.toLowerCase().trim();
        const hasilDiv = document.getElementById('hasilPencarian');
        
        if (!keyword) {
            hasilDiv.innerHTML = "<p style='color:red;'>Silakan masukkan kata kunci terlebih dahulu.</p>";
            return;
        }

        if (dataGangguan.length > 0) {
            lakukanPencarian(keyword, hasilDiv);
            return;
        }

        hasilDiv.innerHTML = "<p>Sedang mengambil data...</p>";

        Papa.parse(csvUrl, {
            download: true,
            header: false,
            complete: function(results) {
                dataGangguan = results.data;
                lakukanPencarian(keyword, hasilDiv);
            },
            error: function(err) {
                hasilDiv.innerHTML = `<div class="alert alert-danger">Gagal mengambil data dari Google Sheets. Pastikan akses tautan diatur ke 'Siapa saja'.</div>`;
            }
        });
    }

    function lakukanPencarian(keyword, hasilDiv) {
        let htmlOutput = "";
        let ditemukan = false;

        htmlOutput += `<table class="table table-bordered table-striped align-middle">
                        <thead>
                            <tr>
                                <th style="width: 8%;">No</th>
                                <th>Jenis Gangguan</th>
                                <th>Tindakan Perbaikan</th>
                                <th style="width: 15%;" class="text-center">Detail Foto</th>
                            </tr>
                        </thead>
                        <tbody>`;

        for (let i = 1; i < dataGangguan.length; i++) {
            const row = dataGangguan[i];
            if (row.length < 2) continue; 

            const no = escapeHTML(row[0] || '');
            const jenisGangguan = escapeHTML(row[1] || '');
            const tindakanPerbaikan = escapeHTML(row[2] || '');
            
            // Kolom ke-4 (Indeks 3) di Google Sheets dianggap sebagai Link Foto
            const fotoUrl = row[3] ? row[3].trim() : ''; 

            if (jenisGangguan.toLowerCase().includes(keyword)) {
                ditemukan = true;
                
                let tombolFoto = '';
                // Validasi apakah ada link foto yang valid
                if (fotoUrl && fotoUrl.startsWith('http')) {
                    // Jika ada foto, tombol berupa link aktif ke tab baru
                    tombolFoto = `<a href="${fotoUrl}" target="_blank" class="btn btn-primary btn-sm">
                                    <i class="bi bi-image"></i> Lihat Detail
                                  </a>`;
                } else {
                    // Jika tidak ada foto, tombol otomatis mati (disabled)
                    tombolFoto = `<button class="btn btn-secondary btn-sm" disabled>
                                    <i class="bi bi-image-alt"></i> No Foto
                                  </button>`;
                }

                htmlOutput += `<tr>
                                <td class="text-center">${no}</td>
                                <td>${jenisGangguan}</td>
                                <td>${tindakanPerbaikan}</td>
                                <td class="text-center">${tombolFoto}</td>
                               </tr>`;
            }
        }

        htmlOutput += `</tbody></table>`;

        if (ditemukan) {
            hasilDiv.innerHTML = `<h4 class="mt-3">Hasil Pencarian untuk: <em>'${escapeHTML(keyword)}'</em></h4>` + htmlOutput;
        } else {
            hasilDiv.innerHTML = `<div class="alert alert-warning mt-3">Data gangguan dengan kata kunci <strong>'${escapeHTML(keyword)}'</strong> tidak ditemukan.</div>`;
        }
    }
</script>

    <script>
      (() => {
        'use strict'
        const getStoredTheme = () => localStorage.getItem('theme')
        const setStoredTheme = theme => localStorage.setItem('theme', theme)
        const getPreferredTheme = () => {
          const storedTheme = getStoredTheme()
          if (storedTheme) return storedTheme
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        const setTheme = theme => {
          if (theme === 'auto') {
            document.documentElement.setAttribute('data-bs-theme', (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'))
          } else {
            document.documentElement.setAttribute('data-bs-theme', theme)
          }
        }
        setTheme(getPreferredTheme())

        window.addEventListener('DOMContentLoaded', () => {
          document.querySelectorAll('[data-bs-theme-value]').forEach(toggle => {
            toggle.addEventListener('click', () => {
              const theme = toggle.getAttribute('data-bs-theme-value')
              setStoredTheme(theme)
              setTheme(theme)
            })
          })
        })
      })()
    </script>
  </body>
</html>
