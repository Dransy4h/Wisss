<script>
// --- KONFIGURASI UTAMA GOOGLE SHEETS ---
const spreadsheetId = '1dcO7kOygkZDbYmc8Jx28UfTLFuIVgo4pXuSTAeYnzxI';
const csvURL = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv`;
const scriptTambahURL = 'URL_GOOGLE_APPS_SCRIPT_ANDA_DISINI';

// =========================================================================
// SCRIPT BARU: Fungsi Pembantu untuk Membaca CSV Secara Aman (Anti-Error Enter)
// =========================================================================
function parseCSVAman(text) {
    let barisData = [];
    let kolom = [''];
    let diDalamKutip = false;

    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        let nextChar = text[i + 1];

        if (char === '"') {
            if (diDalamKutip && nextChar === '"') {
                kolom[kolom.length - 1] += '"';
                i++;
            } else {
                diDalamKutip = !diDalamKutip;
            }
        } else if (char === ',' && !diDalamKutip) {
            kolom.push('');
        } else if ((char === '\r' || char === '\n') && !diDalamKutip) {
            if (char === '\r' && nextChar === '\n') i++;
            barisData.push(kolom);
            kolom = [''];
        } else {
            kolom[kolom.length - 1] += char;
        }
    }
    if (kolom.length > 1 || kolom[0] !== '') {
        barisData.push(kolom);
    }
    return barisData;
}

// --- FUNGSI 1: CARI DATA ---
function cariGangguan() {
    const keyword = document.getElementById('keyword').value.trim().toLowerCase();
    const hasilDiv = document.getElementById('hasilPencarian');

    if (keyword === "") {
        alert("Silakan masukkan kata kunci pencarian terlebih dahulu!");
        return;
    }

    hasilDiv.innerHTML = `
        <div class="d-flex align-items-center justify-content-center my-4">
            <div class="spinner-border text-primary me-2" role="status"></div>
            <span>Mencari data...</span>
        </div>`;

    fetch(csvURL)
    .then(response => {
        if (!response.ok) throw new Error("Gagal mengunduh basis data CSV.");
        return response.text();
    })
    .then(csvText => {
        const semuaBaris = parseCSVAman(csvText);
        let htmlTabel = buatHeaderTabel();
        let jumlahDataFound = 0;

        for (let i = 1; i < semuaBaris.length; i++) {
            const kolom = semuaBaris[i];
            if (kolom.length < 2 || kolom[0].trim() === "") continue;

            const no = kolom[0].replace(/\s+/g, ' ').trim();
           const jenisGangguan = kolom[1].replace(/\s+/g, ' ').trim();
            const tindakanPerbaikan = (kolom[2] || '').replace(/\s+/g, ' ').trim();
            const dataFoto = (kolom[3] || '').replace(/\s+/g, ' ').trim();

            if (jenisGangguan.toLowerCase().includes(keyword) || tindakanPerbaikan.toLowerCase().includes(keyword)) {
                let tombolFoto = buatTombolFoto(dataFoto);
                htmlTabel += `<tr>
                                <td class="text-center">${no}</td>
                                <td>${jenisGangguan}</td>
                                <td>${tindakanPerbaikan}</td>
                                <td class="text-center">${tombolFoto}</td>
                              </tr>`;
                jumlahDataFound++;
            }
        }

        htmlTabel += `</tbody></table></div>`;

        if (jumlahDataFound > 0) {
            hasilDiv.innerHTML = htmlTabel + `<div class="small text-muted mt-2 text-end">Ditemukan <strong>${jumlahDataFound}</strong> hasil untuk kata kunci "${keyword}".</div>`;
        } else {
            hasilDiv.innerHTML = `<div class="alert alert-warning m-0">Data tidak ditemukan untuk kata kunci: "<strong>${keyword}</strong>".</div>`;
        }
    })
    .catch(error => {
        hasilDiv.innerHTML = `<div class="alert alert-danger m-0"><strong>Error:</strong> ${error.message}</div>`;
    });
}

// --- FUNGSI 2: TAMPILKAN SEMUA DATA ---
function tampilkanSemuaData() {
    const hasilDiv = document.getElementById('hasilPencarian');
    
    hasilDiv.innerHTML = `
        <div class="d-flex align-items-center justify-content-center my-4">
            <div class="spinner-border text-secondary me-2" role="status"></div>
            <span>Memuat seluruh data dari Google Sheets...</span>
        </div>`;

    fetch(csvURL)
    .then(response => {
        if (!response.ok) throw new Error("Gagal memuat rekap data.");
        return response.text();
    })
    .then(csvText => {
        const semuaBaris = parseCSVAman(csvText);
        
        if (semuaBaris.length <= 1) {
            hasilDiv.innerHTML = `<div class="alert alert-warning m-0">Tidak ada data di dalam Spreadsheet.</div>`;
            return;
        }

        let htmlTabel = buatHeaderTabel();
        let jumlahData = 0;

        for (let i = 1; i < semuaBaris.length; i++) {
            const kolom = semuaBaris[i];
            if (kolom.length < 2 || kolom[0].trim() === "") continue;

            const no = kolom[0].replace(/\s+/g, ' ').trim();
            const jenisGangguan = kolom[1].replace(/\s+/g, ' ').trim();
            const tindakanPerbaikan = (kolom[2] || '').replace(/\s+/g, ' ').trim();
            const dataFoto = (kolom[3] || '').replace(/\s+/g, ' ').trim();

            let tombolFoto = buatTombolFoto(dataFoto);

            htmlTabel += `<tr>
                            <td class="text-center">${no}</td>
                            <td>${jenisGangguan}</td>
                            <td>${tindakanPerbaikan}</td>
                            <td class="text-center">${tombolFoto}</td>
                          </tr>`;
            jumlahData++;
        }

        htmlTabel += `</tbody></table></div>`;
        hasilDiv.innerHTML = htmlTabel + `<div class="small text-muted mt-2 text-end">Total: <strong>${jumlahData}</strong> data berhasil dimuat.</div>`;
    })
    .catch(error => {
        hasilDiv.innerHTML = `<div class="alert alert-danger m-0"><strong>Gagal memuat data!</strong> ${error.message}</div>`;
    });
}

// --- FUNGSI PEMBANTU UTILITY ---
function buatHeaderTabel() {
    return `
        <div class="table-responsive shadow-sm rounded border bg-body">
            <table class="table table-striped table-hover align-middle mb-0 text-start">
                <thead class="table-light text-black">
                    <tr>
                        <th style="width: 8%" class="text-center">No</th>
                        <th style="width: 32%">Jenis Gangguan</th>
                        <th style="width: 48%">Tindakan Perbaikan</th>
                        <th style="width: 12%" class="text-center">Foto</th>
                    </tr>
                </thead>
                <tbody>`;
}

function buatTombolFoto(dataFoto) {
    if (!dataFoto) return '<span class="text-muted small">-</span>';
    
    if (dataFoto.startsWith('http')) {
        return `<a href="${dataFoto}" target="_blank" class="btn btn-primary btn-sm py-0 px-2" style="font-size: 12px;"><i class="bi bi-image"></i> Lihat</a>`;
    } else {
        return `<a href="assets/img/${dataFoto}" target="_blank" class="btn btn-primary btn-sm py-0 px-2" style="font-size: 12px;"><i class="bi bi-image"></i> Lihat</a>`;
    }
}

// =========================================================================
// PERUBAHAN UTAMA: Menjalankan fungsi tampilkanSemuaData() otomatis saat page load
// =========================================================================
document.addEventListener('DOMContentLoaded', tampilkanSemuaData);
</script>

<script>
      // 2. SKRIP PEMILIH TEMA (DARK/LIGHT MODE)
      (() => {
        'use strict'
        const getStoredTheme = () => localStorage.getItem('theme')
        const setStoredTheme = theme => localStorage.setItem('theme', theme)
        const getPreferredTheme = () => {
          const storedTheme = getStoredTheme()
          if (storedTheme) return storedTheme
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        const setTheme = theme => {
          if (theme === 'auto') {
            document.documentElement.setAttribute('data-bs-theme', (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'))
          } else {
            document.documentElement.setAttribute('data-bs-theme', theme)
          }
        }
        setTheme(getPreferredTheme())

        window.addEventListener('DOMContentLoaded', () => {
          document.querySelectorAll('[data-bs-theme-value]').forEach(toggle => {
            toggle.addEventListener('click', () => {
              const theme = toggle.getAttribute('data-bs-theme-value')
              setStoredTheme(theme)
              setTheme(theme)
            })
          })
        })
      })()

      // 3. ANIMASI (AOS & GSAP)
      AOS.init({ once: true, duration: 1500 });
      if (document.querySelector('.display-4')) {
        gsap.from('.display-4', { delay: 0.5, duration: 1, opacity: 0, x: '-10%' });
      }
    </script>
