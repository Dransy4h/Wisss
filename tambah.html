<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tambah Data Gangguan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="card border-0">
      <div class="card-header fixed-top bg-dark-subtle">
        <div class="row align-items-center container-fluid">
          <div class="col-3">
            <a href="index.html" class="nav-link active">
              <img src="assets/img/imagees.png" class="clickable" alt="GIPAY" style="width: 32px; height: 32px; object-fit: contain;">
            </a>
          </div>
          <div class="col-9">
            <nav class="nav justify-content-end align-items-center">
              
              <a href="index.html" class="nav-link text-light me-3 small">Home</a>
              
              <div class="nav-item dropdown">
                <button class="btn nav-link dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                  <i class="bi bi-sun theme-icon-active" data-theme-icon-active="bi-sun"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="light">
                      <i class="bi bi-sun me-2 opacity-50" data-theme-icon="bi-sun"></i> Light
                    </button>
                  </li>
                  <li> 
                    <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="dark">
                      <i class="bi bi-moon-fill me-2 opacity-50" data-theme-icon="bi-moon-fill"></i> Dark
                    </button>
                  </li>
                  <li><hr class="dropdown-divider"></li>
                  <li>
                    <button class="dropdown-item d-flex align-items-center" type="button" data-bs-theme-value="auto">
                      <i class="bi bi-circle-half me-2 opacity-50" data-theme-icon="bi-circle-half"></i> Auto
                    </button>
                  </li>
                </ul>
              </div>
            </nav>
          </div>
        </div>
      </div>
    </div> 

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Tambah Data Gangguan Baru</h5>
        </div>
        <div class="card-body">
            <form id="formTambahData" onsubmit="tambahData(event)">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label">Jenis Gangguan</label>
                        <input type="text" id="inputJenis" class="form-control" placeholder="Nama gangguan..." required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Tindakan Perbaikan</label>
                        <input type="text" id="inputTindakan" class="form-control" placeholder="Solusi perbaikan..." required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Link Foto Dokumentasi</label>
                        <input type="url" id="inputFoto" class="form-control" placeholder="https://example.com/foto.jpg">
                    </div>
                </div>
                <button type="submit" class="btn btn-success mt-3" id="btnSubmit">
                    <span id="btnText">Simpan Data</span>
                    <span id="btnLoading" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
            </form>
            <div id="statusInput" class="mt-3"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<script>
    // --- KONFIGURASI URL ---
    const spreadsheetId = '1dcO7kOygkZDbYmc8Jx28UfTLFuIVgo4pXuSTAeYnzxI';
    const csvURL = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv`;
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyBD1djuDFui7iR7_qvsdKoQfZ4KJGrZ96SmEuXOjG0NsSfq31Hwpnzge_w7rsKYVrGvg/exec'; 

    function tambahData(event) {
        event.preventDefault(); // Mencegah reload halaman

        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const btnSubmit = document.getElementById('btnSubmit');
        const statusInput = document.getElementById('statusInput');

        // Mengaktifkan efek loading pada tombol
        btnText.innerText = "Menyimpan...";
        btnLoading.classList.remove('d-none');
        btnSubmit.disabled = true;

        let nextNo = 1; // Default jika sheet masih kosong

        // STEP 1: Ambil data CSV menggunakan split biasa (Tanpa parseCSVAman)
        fetch(csvURL)
        .then(response => {
            if (!response.ok) throw new Error("Gagal mengecek urutan nomor terakhir di Google Sheets.");
            return response.text();
        })
        .then(csvText => {
            // Memisahkan baris berdasarkan Enter biasa
            const barisData = csvText.split(/\r?\n/);
            let maxNo = 0;

            for (let i = 1; i < barisData.length; i++) {
                const baris = barisData[i].trim();
                if (baris === "") continue;

                // VALIDASI REGEX: Cek apakah baris ini diawali oleh nomor murni (misal: "1", atau 1,)
                // Ini untuk mencegah pecahan teks kalimat yang mengandung angka tidak sengaja terhitung sebagai ID
                const kecocokanKarakter = baris.match(/^"?(\d+)"?,/);
                
                if (kecocokanKarakter) {
                    // Ambil angka hasil tangkapan regex grup ke-1
                    const num = parseInt(kecocokanKarakter[1]);
                    if (num > maxNo) {
                        maxNo = num;
                    }
                }
            }
            
            // Formula Auto Increment: Angka terbesar saat ini ditambah 1
            nextNo = maxNo + 1;

            // STEP 2: Susun data baru ke FormData (Nomor otomatis dari sistem)
            const formData = new FormData();
            formData.append('no', nextNo); 
            formData.append('jenisGangguan', document.getElementById('inputJenis').value.trim());
            formData.append('tindakanPerbaikan', document.getElementById('inputTindakan').value.trim());
            formData.append('fotoUrl', document.getElementById('inputFoto').value.trim());

            // STEP 3: Kirim data ke Web App Google Apps Script via POST
            return fetch(scriptURL, { method: 'POST', body: formData });
        })
        .then(response => response.json())
        .then(data => {
            // Mengembalikan tombol ke keadaan semula
            btnText.innerText = "Simpan Data";
            btnLoading.classList.add('d-none');
            btnSubmit.disabled = false;

            if(data.result === "success" || data.status === "success") {
                statusInput.innerHTML = `
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        <strong>Sukses!</strong> Data berhasil disimpan dengan <b>Nomor Urut: ${nextNo}</b>.
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>`;
                
                document.getElementById('formTambahData').reset();

                // Refresh tabel otomatis jika fungsi tampilkanSemuaData() tersedia di index.html Anda
                if (typeof tampilkanSemuaData === "function") {
                    tampilkanSemuaData();
                }
            } else {
                statusInput.innerHTML = `<div class="alert alert-danger">Gagal menyimpan: ${data.message || 'Terjadi kesalahan backend.'}</div>`;
            }
        })
        .catch(error => {
            // Penanganan jika terjadi kendala jaringan / fetch gagal
            btnText.innerText = "Simpan Data";
            btnLoading.classList.add('d-none');
            btnSubmit.disabled = false;
            statusInput.innerHTML = `<div class="alert alert-danger"><strong>Error Sistem:</strong> ${error.message}</div>`;
        });
    }
</script>
    <script>
      (() => {
        'use strict'
        const getStoredTheme = () => localStorage.getItem('theme')
        const setStoredTheme = theme => localStorage.setItem('theme', theme)
        const getPreferredTheme = () => {
          const storedTheme = getStoredTheme()
          if (storedTheme) return storedTheme
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        const setTheme = theme => {
          if (theme === 'auto') {
            document.documentElement.setAttribute('data-bs-theme', (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'))
          } else {
            document.documentElement.setAttribute('data-bs-theme', theme)
          }
        }
        setTheme(getPreferredTheme())

        window.addEventListener('DOMContentLoaded', () => {
          document.querySelectorAll('[data-bs-theme-value]').forEach(toggle => {
            toggle.addEventListener('click', () => {
              const theme = toggle.getAttribute('data-bs-theme-value')
              setStoredTheme(theme)
              setTheme(theme)
            })
          })
        })
      })()
    </script>
</body>
</html>
