<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tambah Data Gangguan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-5">
    <a href="index.html" class="btn btn-secondary btn-sm mb-3"><i class="bi bi-arrow-left"></i> Kembali</a>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Tambah Data Gangguan Baru</h5>
        </div>
        <div class="card-body">
            <form id="formTambahData" onsubmit="tambahData(event)">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label">No</label>
                        <input type="text" id="inputNo" class="form-control" placeholder="Contoh: 1" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Jenis Gangguan</label>
                        <input type="text" id="inputJenis" class="form-control" placeholder="Nama gangguan..." required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Tindakan Perbaikan</label>
                        <input type="text" id="inputTindakan" class="form-control" placeholder="Solusi perbaikan..." required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label">Link Foto Dokumentasi (Opsional)</label>
                        <input type="url" id="inputFoto" class="form-control" placeholder="https://example.com/foto.jpg">
                    </div>
                </div>
                <button type="submit" class="btn btn-success mt-3" id="btnSubmit">
                    <span id="btnText">Simpan Data</span>
                    <span id="btnLoading" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                </button>
            </form>
            <div id="statusInput" class="mt-3"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<script>
    // GANTI dengan URL Web App dari Google Apps Script Anda
    const scriptURL = 'URL_GOOGLE_APPS_SCRIPT_ANDA'; 

    function tambahData(event) {
        event.preventDefault(); // Mencegah reload halaman

        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const btnSubmit = document.getElementById('btnSubmit');
        const statusInput = document.getElementById('statusInput');

        // Mengaktifkan efek loading
        btnText.innerText = "Menyimpan...";
        btnLoading.classList.remove('d-none');
        btnSubmit.disabled = true;

        // Mengambil data dari input berdasarkan ID di form Anda
        const formData = new FormData();
        formData.append('no', document.getElementById('inputNo').value.trim());
        formData.append('jenisGangguan', document.getElementById('inputJenis').value.trim());
        formData.append('tindakanPerbaikan', document.getElementById('inputTindakan').value.trim());
        formData.append('fotoUrl', document.getElementById('inputFoto').value.trim());

        fetch(scriptURL, { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            // Mengembalikan tombol ke sedia kala
            btnText.innerText = "Simpan Data";
            btnLoading.classList.add('d-none');
            btnSubmit.disabled = false;

            if(data.result === "success" || data.status === "success") {
                statusInput.innerHTML = `<div class="alert alert-success"><strong>Sukses!</strong> Data berhasil disimpan ke Google Sheets.</div>`;
                document.getElementById('formTambahData').reset();
            } else {
                statusInput.innerHTML = `<div class="alert alert-danger">Gagal menyimpan: ${data.message || 'Terjadi kesalahan'}</div>`;
            }
        })
        .catch(error => {
            btnText.innerText = "Simpan Data";
            btnLoading.classList.add('d-none');
            btnSubmit.disabled = false;
            statusInput.innerHTML = `<div class="alert alert-danger">Error Sistem: ${error.message}</div>`;
        });
    }
</script>
</body>
</html>
